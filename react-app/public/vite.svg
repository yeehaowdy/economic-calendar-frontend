<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="chartGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Chart area fill -->
  <polygon points="4,22 9,16 14,18 19,11 25,13 28,9 28,24 4,24" fill="url(#chartGrad)" opacity="0.35"/>

  <!-- Chart line -->
  <polyline points="4,22 9,16 14,18 19,11 25,13 28,9"
    fill="none" stroke="#10B981" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Dot at peak -->
  <circle cx="19" cy="11" r="1.5" fill="#10B981"/>

  <!-- Bottom bar accent -->
  <rect x="4" y="26.5" width="24" height="1.2" rx="0.6" fill="#10B981" opacity="0.4"/>
</svg>
